# Vale configuration file
# This file configures Vale linter for natural language validation

# Minimum alert level (suggestion, warning, error)
MinAlertLevel = suggestion

# Vocabularies (terminology dictionaries)
# Path to vocabularies - can be relative or absolute
Vocab = .github/linters/.vale

# Rules configuration
[*.{md,MD,txt,TXT}]
# Disable Terminology rule to ignore terminology checks like "git" vs "Git"
# Set to false to disable all terminology checks
# Terminology = false

# Or use a custom vocabulary that accepts "git" as lowercase
# The git.txt file in .github/linters/.vale/ contains accepted lowercase terms
